<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Reference Dashboard para integração com CORE QAI"
    >

    <title>
        Monitor IAQ | Reference Dashboard
    </title>


    <!-- ==============================================================
         Styles
    ============================================================== -->

    <link
        rel="stylesheet"
        href="./style.css"
    >

</head>


<body>

    <!-- ==============================================================
         APPLICATION
    ============================================================== -->

    <div
        id="app"
        class="app-shell"
    >


        <!-- ==========================================================
             HEADER
        ========================================================== -->

        <header
            id="header"
            class="app-header-container"
            aria-label="Cabeçalho da aplicação"
        ></header>


        <!-- ==========================================================
             NAVIGATION
        ========================================================== -->

        <nav
            id="navbar"
            class="app-navbar-container"
            aria-label="Navegação principal"
        ></nav>


        <!-- ==========================================================
             WORKSPACE
        ========================================================== -->

        <main
            id="workspace"
            class="app-workspace"
            aria-live="polite"
        ></main>


    </div>


    <!-- ==============================================================
         APPLICATION BOOTSTRAP
    ============================================================== -->

    <script
        type="module"
        src="./script.js"
    ></script>

</body>

</html>
